<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUNR Research Dashboard</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0e1a;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .recharts-default-tooltip {
      color: white;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #1f2937;
      border-radius: 3px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #3b82f6;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;
    const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line, CartesianGrid, Legend, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis, AreaChart, Area } = Recharts;

    const C = { bg: "#0a0e1a", card: "#111827", bdr: "#1f2937", acc: "#3b82f6", grn: "#10b981", red: "#ef4444", yel: "#f59e0b", pur: "#8b5cf6", cyan: "#06b6d4", mut: "#9ca3af", dim: "#6b7280", txt: "#e5e7eb" };
    const COLORS = [C.acc, C.grn, C.pur, C.yel, C.cyan];

    const STOCKS = {
      LUNR: { name: "Intuitive Machines", price: 16.38, prev: 18.90, mc: "3.35B", pe: -8.83, w52h: 23.32, w52l: 6.14, sector: "Lunar Lander", ptAvg: 18.89, ptHigh: 26, ptLow: 9.5, beta: 2.97, risk: 9 },
      RKLB: { name: "Rocket Lab", price: 69.10, prev: 72.65, mc: "39.2B", pe: -76.8, w52h: 99.58, w52l: 14.71, sector: "Launch + Systems", ptAvg: 65.91, ptHigh: 105, ptLow: 47.47, beta: 2.17, risk: 7 },
      FLY: { name: "Firefly Aerospace", price: 20.38, prev: 21.53, mc: "3.25B", pe: -1.5, w52h: 73.80, w52l: 16.00, sector: "Launch + Lunar", ptAvg: 40.75, ptHigh: 65, ptLow: 28, beta: 2.89, risk: 8 },
    };
    const ETFS = {
      UFO: { name: "Procure Space ETF", price: 42.67, er: 0.94, w52h: 48.66, w52l: 18.40, ytd: 66.44, aum: "118M", holdings: 30 },
      ARKX: { name: "ARK Space & Defense", price: 32.40, er: 0.75, w52h: 35.53, w52l: 15.07, ytd: 52.92, aum: "440M", holdings: 35 },
    };
    const ALL = { ...STOCKS, ...ETFS };

    const CATALYSTS = [
      { event: "LUNR Earnings(Q4)", date: "Mar 19, 2026", impact: "High", type: "Earnings", detail: "$175M raise impact, IM-3 timeline update, LTV proposal status, Lanteris integration progress",
        expandedContent: (
          <div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginBottom: 4 }}>Lanteris Acquisition & Revenue Ramp</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              Q4 2025 is the first report fully incorporating the Lanteris acquisition (closed Jan 2026, ~$800M deal). Combined company revenue exceeds $850M with $920M in contract backlog and positive adjusted EBITDA — a meaningful shift from standalone LUNR. The $175M equity raise at $15.12/share extends runway but dilutes. The long-run engine is NSNS ($4.82B NASA comms infrastructure contract via Space Networks Solutions LLC with KBR) — timing of revenue recognition from that contract is the key number to watch.
            </div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginTop: 10, marginBottom: 4 }}>What to Watch on the Call</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              NSNS revenue recognition schedule, IM-3 launch window confirmation, LTV award status (management will face questions), and Lanteris integration cost surprises. If Lanteris synergies are ahead of plan and NSNS starts showing up in the top line, the stock re-rates.
            </div>
            <div style={{ color: C.dim, fontSize: 11, marginTop: 10 }}>Sources: Intuitive Machines investor press releases, Q1 2025 earnings call transcript, NSNS contract announcement (investors.intuitivemachines.com)</div>
          </div>
        )
      },
      { event: "LTV Contract Award", date: "Q1 - Q2 2026", impact: "Critical", type: "Contract", detail: "Up to $4.6B total value. LUNR Moon RACER vs Lunar Outpost Eagle vs Astrolab FLEX. NASA indicated 'coming weeks' as of Jan 2026",
        expandedContent: (
          <div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginBottom: 4 }}>Three-Way Competition</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, margin: "6px 0 10px" }}>
              <div style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 6, padding: 8 }}>
                <div style={{ color: C.acc, fontWeight: 700, fontSize: 11 }}>Moon Racer</div>
                <div style={{ color: C.dim, fontSize: 10 }}>LUNR / Intuitive Machines</div>
                <div style={{ color: "#fff", fontWeight: 700, fontSize: 13, margin: "4px 0" }}>$1.692B</div>
                <div style={{ color: C.dim, fontSize: 10 }}>Partners:</div>
                <div style={{ color: C.mut, fontSize: 10 }}>Boeing + Northrop Grumman</div>
                <div style={{ color: C.dim, fontSize: 10 }}>Delivery:</div>
                <div style={{ color: C.mut, fontSize: 10 }}>Nova-D on Falcon Heavy</div>
              </div>
              <div style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 6, padding: 8 }}>
                <div style={{ color: C.yel, fontWeight: 700, fontSize: 11 }}>Eagle</div>
                <div style={{ color: C.dim, fontSize: 10 }}>Lunar Outpost</div>
                <div style={{ color: "#fff", fontWeight: 700, fontSize: 13, margin: "4px 0" }}>$1.727B</div>
                <div style={{ color: C.dim, fontSize: 10 }}>Partners:</div>
                <div style={{ color: C.mut, fontSize: 10 }}>Lost Lockheed Martin (Sept 2024)</div>
                <div style={{ color: C.dim, fontSize: 10 }}>Delivery:</div>
                <div style={{ color: C.mut, fontSize: 10 }}>SpaceX Starship</div>
              </div>
              <div style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 6, padding: 8 }}>
                <div style={{ color: C.red, fontWeight: 700, fontSize: 11 }}>FLEX</div>
                <div style={{ color: C.dim, fontSize: 10 }}>Venturi Astrolab</div>
                <div style={{ color: "#fff", fontWeight: 700, fontSize: 13, margin: "4px 0" }}>$1.928B</div>
                <div style={{ color: C.dim, fontSize: 10 }}>Partners:</div>
                <div style={{ color: C.mut, fontSize: 10 }}>Starship-dependent</div>
                <div style={{ color: C.dim, fontSize: 10 }}>Delivery:</div>
                <div style={{ color: C.mut, fontSize: 10 }}>SpaceX Starship</div>
              </div>
            </div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              Lockheed Martin's departure from Lunar Outpost in Sept 2024 weakened their team. LUNR's self-owned delivery vehicle (Nova-D) reduces single-supplier risk that affects both competitors. The caveat: two consecutive hard landings are a liability when NASA is choosing an Artemis infrastructure partner.
            </div>
            <div style={{ color: C.dim, fontSize: 11, marginTop: 10 }}>Sources: SpaceNews LTV coverage, NASA CLPS program, Intuitive Machines investor presentations</div>
          </div>
        )
      },
      { event: "IM - 3 Mission Launch", date: "H2 2026", impact: "Critical", type: "Mission", detail: "Reiner Gamma landing. Carries CADRE rovers + Khon - 2 relay satellite. Must land upright after two consecutive hard landings",
        expandedContent: (
          <div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginBottom: 4 }}>The Failure Pattern</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              IM-1 (Feb 2024): altimeter safety switch not activated pre-launch, lander tipped ~30° on contact, operated ~7 days, returned ~350 MB — NASA called it a qualified success. IM-2 (Mar 2025): altimeter failed during descent, struck a plateau, tipped completely, operated ~13 hours, returned ~250 MB. Same root cause category, worse outcome.
            </div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginTop: 10, marginBottom: 4 }}>Root Causes (Altemus, May 2025)</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.7 }}>
              1. Laser altimeter signal noise and distortion during final descent<br />
              2. Low sun angles at the south pole creating long navigation shadows<br />
              3. Craters appearing differently at low altitude vs. NASA LRO reference imagery
            </div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginTop: 10, marginBottom: 4 }}>The Fix &amp; The Caveat</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              Engineering fixes for IM-3: redundant dissimilar altimeters, a lighting-independent surface velocity sensor, an expanded onboard crater database, and ML improvements trained on IM-2 imagery. Altemus said "slight cost increase, no schedule impact." Critical caveat: IM-3 targets Reiner Gamma near the equator — far easier than the south pole. IM-4 returns to the south pole. A clean IM-3 proves the altimeter fix, not the lighting challenge.
            </div>
            <div style={{ color: C.dim, fontSize: 11, marginTop: 10 }}>Sources: SpaceNews altimeter analysis (May 2025), Spaceflight Now Q1 earnings coverage, Intuitive Machines IM-2 mission page</div>
          </div>
        )
      },
      { event: "RKLB Neutron First Launch", date: "Late 2026", impact: "High", type: "Mission", detail: "Medium - lift vehicle debut. Delayed from 2025. Key to competing with Falcon 9 for constellation deployment",
        expandedContent: (
          <div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginBottom: 4 }}>Sector Blue Chip Context</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              Rocket Lab posted $602M in record Q4 2025 revenue and holds an $816M SDA (Space Development Agency) satellite constellation contract providing multi-year visibility. Electron has 50+ launches and is the proven small-sat workhorse. At $39.2B market cap, RKLB is expensive relative to peers — but it's grounded in real, growing revenue unlike LUNR or FLY.
            </div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginTop: 10, marginBottom: 4 }}>Why Neutron Matters</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              Neutron is a medium-lift reusable rocket meant to compete with Falcon 9 for constellation deployments — originally targeted 2025, now late 2026. Success would expand Rocket Lab's addressable market from ~$10B (small-sat launch) into the full launch market and validate its vertical integration strategy (they build the spacecraft, the components, and now the rocket). The delay risk is real: slippage from 2025 already cost credibility on timeline execution.
            </div>
            <div style={{ color: C.dim, fontSize: 11, marginTop: 10 }}>Sources: Rocket Lab Q4 2025 earnings release, SDA contract announcements, SpaceNews Neutron coverage</div>
          </div>
        )
      },
      { event: "SpaceX IPO / Starlink Spin - off", date: "TBD 2026 - 27", impact: "Sector", type: "Catalyst", detail: "Could pull massive capital into space sector. Rising tide lifts all boats — or creates a gravity well that sucks liquidity from smaller names",
        expandedContent: (
          <div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginBottom: 4 }}>The Deal Structure</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              SpaceX merged with xAI (which had acquired X/Twitter in March 2025) on February 2, 2026. The combined entity is valued at $1.25T ($1T SpaceX + $250B xAI) — the world's most valuable private company. SpaceX generated $15B in revenue and ~$8B in profit in 2025. xAI generated ~$250M in revenue while losing $2.5B. Musk is targeting a July 2026 IPO at up to $1.5T — approximately 94x trailing sales on the combined entity.
            </div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginTop: 10, marginBottom: 4 }}>Sector Impact: Bull vs. Bear</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              Bull: a successful IPO floods institutional attention into the space sector, lifting LUNR, FLY, and RKLB through re-rating and capital inflows. Bear: investors concentrate in SpaceX directly, draining liquidity from smaller names; or the $1.5T valuation disappoints and drags the whole sector lower. Some analysts view the xAI merger as profitable SpaceX subsidizing a cash-burning AI venture — a structural weakness if that narrative takes hold. XOVR ETF currently holds ~10-11% SpaceX for retail pre-IPO exposure.
            </div>
            <div style={{ color: C.dim, fontSize: 11, marginTop: 10 }}>Sources: CNBC SpaceX-xAI merger coverage (Feb 2026), Motley Fool merger analysis (Feb 22, 2026), Gary Marcus Substack</div>
          </div>
        )
      },
      { event: "Artemis III Crewed Landing", date: "2028 target", impact: "Sector", type: "Mission", detail: "Trump exec order: return to Moon by 2028. Permanent outpost by 2030. LTV needed for surface ops",
        expandedContent: (
          <div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginBottom: 4 }}>LUNR's Infrastructure Stack</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              LUNR is positioned at multiple layers of the Artemis supply chain: NSNS ($4.82B) keeps astronauts connected via Space Networks Solutions LLC (LUNR + KBR JV); LTV Moon Racer (~$4.6B, pending award) moves them on the surface; and CLPS task orders (IM-3, IM-4) pre-position payloads and establish the Khonstellation data relay network. All three need to be operational for a 2028 crewed landing. This multi-layer positioning is the long-game bull case — every Artemis milestone is a LUNR revenue event.
            </div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginTop: 10, marginBottom: 4 }}>The Political Risk</div>
            <div style={{ color: C.mut, fontSize: 12, lineHeight: 1.6 }}>
              Artemis has slipped repeatedly: originally targeting 2024, then 2025, then 2026, now 2028. NASA budgets require sustained congressional appropriation, and program priorities can shift with administrations. If Artemis is restructured, defunded, or delayed further, NSNS revenue recognition and LTV contract execution could be deferred or cancelled outright. The 2028 target is aspirational — Trump's executive order sets intent, not funding.
            </div>
            <div style={{ color: C.dim, fontSize: 11, marginTop: 10 }}>Sources: NASA Artemis program page, Trump space policy executive order, SpaceNews Artemis timeline coverage</div>
          </div>
        )
      },
    ];

    const STOCK_CONTEXT = {
      LUNR: "IM-3 launch H2 2026 · LTV bid lowest at $1.69B · $4.82B NSNS backlog",
      RKLB: "Record $602M Q4 rev · $816M SDA contract · Neutron debut late 2026",
      FLY:  "Blue Ghost: first clean commercial Moon landing · 5 CLPS task orders through 2029",
    };
    const ETF_CONTEXT = {
      UFO:  "Only pure-play space ETF · 0.94% ER · Highest direct space exposure",
      ARKX: "Actively managed · 0.75% ER · Broadest definition of 'space' — includes defense, eVTOL",
    };
    const COST_CONTEXT = {
      LUNR: "Next catalyst: Earnings Mar 19 → LTV award Q1-Q2 → IM-3 H2 2026",
      RKLB: "Next catalyst: Neutron launch late 2026 · Trading at $39.2B MCap",
      FLY:  "Blue Ghost 2 fully booked · IPO'd Aug 2025 at $45, now ~$20",
    };

    const TABS = ["Overview", "Portfolio", "Catalysts", "Sensitivity", "Cost Basis"];
    const pct = (c, p) => ((c - p) / p * 100).toFixed(2);

    function App() {
      const [tab, setTab] = useState("Overview");
      const [budget, setBudget] = useState(15000);
      const [alloc, setAlloc] = useState({ LUNR: 25, RKLB: 25, FLY: 15, UFO: 20, ARKX: 15 });
      const [sensTarget, setSensTarget] = useState("LUNR");
      const [costEntries, setCostEntries] = useState(
        Object.keys(ALL).map(t => ({ ticker: t, shares: 0, avgCost: 0 }))
      );
      const [expandedCatalyst, setExpandedCatalyst] = useState(null);

      const totalAlloc = useMemo(() => Object.values(alloc).reduce((a, b) => a + b, 0), [alloc]);

      const portfolioData = useMemo(() =>
        Object.entries(alloc).map(([t, v]) => {
          const p = ALL[t]?.price || 0;
          const d = budget * (v / totalAlloc);
          return { ticker: t, name: ALL[t]?.name, pct: v, dollars: d, shares: p > 0 ? d / p : 0, price: p };
        })
        , [alloc, budget, totalAlloc]);

      const scenarios = useMemo(() => {
        const m = {
          bull: { LUNR: 2.5, RKLB: 1.8, FLY: 3.0, UFO: 1.6, ARKX: 1.5 },
          base: { LUNR: 1.3, RKLB: 1.3, FLY: 1.5, UFO: 1.2, ARKX: 1.2 },
          bear: { LUNR: 0.4, RKLB: 0.7, FLY: 0.3, UFO: 0.75, ARKX: 0.8 },
        };
        return Object.entries(m).map(([s, mul]) => {
          let v = 0; portfolioData.forEach(p => { v += p.shares * p.price * (mul[p.ticker] || 1) });
          return { scenario: s[0].toUpperCase() + s.slice(1), value: v, ret: ((v - budget) / budget * 100).toFixed(1) };
        });
      }, [portfolioData, budget]);

      const sensitivityData = useMemo(() => {
        const pts = [];
        for (let chg = -50; chg <= 100; chg += 5) {
          let pv = 0;
          portfolioData.forEach(p => { pv += p.shares * p.price * (p.ticker === sensTarget ? (1 + chg / 100) : 1) });
          pts.push({ change: `${chg >= 0 ? '+' : ''}${chg}%`, pctChange: chg, value: pv, ret: ((pv - budget) / budget * 100).toFixed(1) });
        }
        return pts;
      }, [sensTarget, portfolioData, budget]);

      const rebalTriggers = useMemo(() => {
        const totalVal = portfolioData.reduce((a, x) => a + x.shares * x.price, 0);
        return portfolioData.map(p => {
          const tgt = p.pct / totalAlloc * 100;
          const cur = totalVal > 0 ? (p.shares * p.price / totalVal * 100) : 0;
          const drift = cur - tgt;
          return { ...p, targetPct: tgt, curPct: cur, drift, needsRebal: Math.abs(drift) > 5 };
        });
      }, [portfolioData, totalAlloc]);

      const ttStyle = { background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 8, color: "#fff", fontSize: 12 };

      const Pill = ({ active, label, onClick }) => (
        <button onClick={onClick} style={{ padding: "6px 16px", borderRadius: 20, border: `1px solid ${active ? C.acc : C.bdr}`, background: active ? "rgba(59,130,246,0.15)" : "transparent", color: active ? C.acc : C.mut, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>{label}</button>
      );

      const StatCard = ({ label, value, sub, color }) => (
        <div style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 10, padding: "14px 16px", flex: 1, minWidth: 140 }}>
          <div style={{ color: C.dim, fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
          <div style={{ color: color || "#fff", fontSize: 22, fontWeight: 700, marginTop: 4 }}>{value}</div>
          {sub && <div style={{ color: C.dim, fontSize: 11, marginTop: 2 }}>{sub}</div>}
        </div>
      );

      const StockRow = ({ ticker, data, isETF }) => {
        const chg = isETF ? null : pct(data.price, data.prev);
        return (
          <div style={{ display: "flex", alignItems: "center", padding: "12px 16px", borderBottom: `1px solid ${C.bdr}`, gap: 12 }}>
            <div style={{ minWidth: 56 }}><span style={{ color: C.acc, fontWeight: 700, fontSize: 14 }}>{ticker}</span></div>
            <div style={{ flex: 1 }}>
              <div style={{ color: "#fff", fontSize: 13, fontWeight: 600 }}>{data.name}</div>
              <div style={{ color: C.dim, fontSize: 11 }}>{isETF ? `ER: ${data.er}% | AUM: ${data.aum}` : `${data.sector} | MCap: ${data.mc}`}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ color: "#fff", fontSize: 15, fontWeight: 700 }}>${data.price.toFixed(2)}</div>
              {chg && <div style={{ color: chg >= 0 ? C.grn : C.red, fontSize: 12 }}>{chg >= 0 ? '+' : ''}{chg}%</div>}
              {isETF && <div style={{ color: C.grn, fontSize: 12 }}>YTD: +{data.ytd}%</div>}
            </div>
          </div>
        );
      };

      return (
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
            {TABS.map(t => <Pill key={t} label={t} active={tab === t} onClick={() => setTab(t)} />)}
          </div>

          {tab === "Overview" && <div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
              {Object.entries(STOCKS).map(([t, d]) => (
                <div key={t} style={{ flex: 1, minWidth: 140, display: "flex", flexDirection: "column", gap: 4 }}>
                  <StatCard label={t} value={`$${d.price}`} sub={`${pct(d.price, d.prev)}% today`} color={d.price >= d.prev ? C.grn : C.red} />
                  <div style={{ color: C.mut, fontSize: 11, padding: "0 4px", lineHeight: 1.4 }}>{STOCK_CONTEXT[t]}</div>
                </div>
              ))}
            </div>

            <div style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 12, marginBottom: 16 }}>
              <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.bdr}` }}><span style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>Individual Stocks</span></div>
              {Object.entries(STOCKS).map(([t, d]) => <StockRow key={t} ticker={t} data={d} />)}
            </div>

            <div style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 12, marginBottom: 16 }}>
              <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.bdr}` }}><span style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>Space ETFs</span></div>
              {Object.entries(ETFS).map(([t, d]) => (
                <React.Fragment key={t}>
                  <StockRow ticker={t} data={d} isETF />
                  <div style={{ padding: "3px 16px 8px", color: C.dim, fontSize: 11 }}>{ETF_CONTEXT[t]}</div>
                </React.Fragment>
              ))}
            </div>

            <div style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: 14, marginBottom: 12 }}>Analyst Price Targets vs Current</div>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={Object.entries(STOCKS).map(([t, d]) => ({ ticker: t, current: d.price, target: d.ptAvg }))}>
                  <XAxis dataKey="ticker" stroke={C.dim} fontSize={12} />
                  <YAxis stroke={C.dim} fontSize={11} />
                  <Tooltip contentStyle={ttStyle} />
                  <Bar dataKey="current" fill={C.acc} name="Current" radius={[4, 4, 0, 0]} />
                  <Bar dataKey="target" fill={C.grn} name="Avg Target" radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
              <div style={{ display: "flex", gap: 16, marginTop: 8, justifyContent: "center" }}>
                {Object.entries(STOCKS).map(([t, d]) => {
                  const u = ((d.ptAvg - d.price) / d.price * 100).toFixed(0);

                  <CartesianGrid strokeDasharray="3 3" stroke={C.bdr} />
                  <XAxis dataKey="change" stroke={C.dim} fontSize={10} interval={3} />
                  <YAxis stroke={C.dim} fontSize={11} tickFormatter={v => `$${(v / 1000).toFixed(0)}k`} />
                  <Tooltip contentStyle={ttStyle} formatter={(v, name) => name === "value" ? `$${Number(v).toLocaleString(undefined, { maximumFractionDigits: 0 })}` : `${v}%`} />
                  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.acc} stopOpacity={0.3} /><stop offset="100%" stopColor={C.acc} stopOpacity={0} /></linearGradient></defs>
                  <Area type="monotone" dataKey="value" stroke={C.acc} fill="url(#grad)" strokeWidth={2} name="value" />
                </AreaChart>
              </ResponsiveContainer>
              <div style={{ textAlign: "center", color: C.dim, fontSize: 11, marginTop: 8 }}>{sensTarget} price change → total portfolio value (other positions held constant)</div>
            </div>

            <div style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 12, padding: 16 }}>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: 14, marginBottom: 12 }}>Stress Test: Sector-Wide Scenarios</div>
              {[
                { label: "🟢 SpaceX IPO Hype", mults: { LUNR: 1.4, RKLB: 1.6, FLY: 1.5, UFO: 1.4, ARKX: 1.3 } },
                { label: "🔴 IM-3 Fails + LTV to Competitor", mults: { LUNR: 0.35, RKLB: 0.9, FLY: 1.1, UFO: 0.85, ARKX: 0.9 } },
                { label: "🟡 Broad Space Selloff (Rates Up)", mults: { LUNR: 0.7, RKLB: 0.65, FLY: 0.6, UFO: 0.7, ARKX: 0.75 } },
                { label: "🟢 LUNR Lands + Wins LTV", mults: { LUNR: 3.0, RKLB: 1.1, FLY: 0.85, UFO: 1.15, ARKX: 1.1 } },
              ].map((sc, si) => {
                let v = 0; portfolioData.forEach(p => { v += p.shares * p.price * (sc.mults[p.ticker] || 1) });
                const ret = ((v - budget) / budget * 100).toFixed(1);
                return (
                  <div key={si} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: si < 3 ? `1px solid ${C.bdr}` : "none" }}>
                    <span style={{ color: "#fff", fontSize: 13 }}>{sc.label}</span>
                    <div style={{ textAlign: "right" }}>
                      <span style={{ color: ret >= 0 ? C.grn : C.red, fontSize: 15, fontWeight: 700 }}>{ret >= 0 ? '+' : ''}{ret}%</span>
                      <span style={{ color: C.dim, fontSize: 11, marginLeft: 8 }}>${Number(v).toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>}

          {tab === "Cost Basis" && <div>
            <div style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Cost Basis Tracker</div>
              <div style={{ color: C.dim, fontSize: 12, marginBottom: 16 }}>Enter your actual positions to track P&L</div>
              {costEntries.map((entry, i) => {
                const cp = ALL[entry.ticker]?.price || 0;
                const tc = entry.shares * entry.avgCost;
                const cv = entry.shares * cp;
                const pl = cv - tc;
                const plP = tc > 0 ? ((pl / tc) * 100).toFixed(1) : "0.0";
                return (
                  <div key={entry.ticker} style={{ marginBottom: 12, padding: 12, background: C.bg, borderRadius: 8, border: `1px solid ${C.bdr}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <span style={{ color: C.acc, fontWeight: 700, fontSize: 14 }}>{entry.ticker}</span>
                      <span style={{ color: "#fff", fontSize: 12 }}>Current: ${cp.toFixed(2)}</span>
                    </div>
                    <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
                      <div style={{ flex: 1 }}>
                        <label style={{ color: C.dim, fontSize: 10, display: "block", marginBottom: 2 }}>Shares</label>
                        <input type="number" value={entry.shares || ""} placeholder="0" onChange={e => { const v = [...costEntries]; v[i].shares = Number(e.target.value) || 0; setCostEntries(v) }} style={{ width: "100%", background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 4, padding: "4px 8px", color: "#fff", fontSize: 13 }} />
                      </div>
                      <div style={{ flex: 1 }}>
                        <label style={{ color: C.dim, fontSize: 10, display: "block", marginBottom: 2 }}>Avg Cost</label>
                        <input type="number" value={entry.avgCost || ""} placeholder="0.00" step="0.01" onChange={e => { const v = [...costEntries]; v[i].avgCost = Number(e.target.value) || 0; setCostEntries(v) }} style={{ width: "100%", background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 4, padding: "4px 8px", color: "#fff", fontSize: 13 }} />
                      </div>
                    </div>
                    {entry.shares > 0 && entry.avgCost > 0 && (
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                        <span style={{ color: C.dim }}>Cost: ${tc.toFixed(0)} → Value: ${cv.toFixed(0)}</span>
                        <span style={{ color: pl >= 0 ? C.grn : C.red, fontWeight: 700 }}>{pl >= 0 ? '+' : ''}${pl.toFixed(0)} ({plP}%)</span>
                      </div>
                    )}
                    {entry.shares > 0 && COST_CONTEXT[entry.ticker] && (
                      <div style={{ color: C.dim, fontSize: 11, marginTop: 4 }}>{COST_CONTEXT[entry.ticker]}</div>
                    )}
                    {entry.shares > 0 && ETFS[entry.ticker] && (
                      <div style={{ color: C.dim, fontSize: 11, marginTop: 4 }}>
                        {`At $${(entry.shares * cp).toFixed(0)}, the ${ETFS[entry.ticker].er}% ER costs ~$${(entry.shares * cp * ETFS[entry.ticker].er / 100).toFixed(0)}/year`}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {costEntries.some(e => e.shares > 0 && e.avgCost > 0) && (() => {
              let tc = 0, tv = 0;
              costEntries.forEach(e => { tc += e.shares * e.avgCost; tv += e.shares * (ALL[e.ticker]?.price || 0) });
              const pl = tv - tc; const plP = tc > 0 ? ((pl / tc) * 100).toFixed(1) : "0.0";
              return (
                <div style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 12, padding: 16 }}>
                  <div style={{ color: "#fff", fontWeight: 700, fontSize: 14, marginBottom: 12 }}>Portfolio Summary</div>
                  <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                    <StatCard label="Total Cost" value={`$${tc.toLocaleString(undefined, { maximumFractionDigits: 0 })}`} />
                    <StatCard label="Current Value" value={`$${tv.toLocaleString(undefined, { maximumFractionDigits: 0 })}`} />
                    <StatCard label="Total P&L" value={`${pl >= 0 ? '+' : ''}$${pl.toFixed(0)}`} sub={`${plP}%`} color={pl >= 0 ? C.grn : C.red} />
                  </div>
                </div>
              );
            })()}
          </div>}

          <div style={{ textAlign: "center", color: C.dim, fontSize: 10, marginTop: 24, padding: "12px 0", borderTop: `1px solid ${C.bdr}` }}>
            Research platform for informational purposes only. Not financial advice. Data sourced Feb 28, 2026.
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>

</html>
